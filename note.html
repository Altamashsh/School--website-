<!DOCTYPE html>
<html>
<head>
<style>
  .container {
    width: 100%;
    overflow: hidden;
    position: relative;
  }
  .slider {
    display: flex;
    transition: transform 0.4s ease;
  }
  .page {
    min-width: 100%;
    height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: white;
  }
  .page:nth-child(1) { background: #4f46e5; }
  .page:nth-child(2) { background: #16a34a; }
  .page:nth-child(3) { background: #db2777; }
  .dots { text-align: center; margin-top: 10px; }
  .dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ccc;
    margin: 0 4px;
    cursor: pointer;
  }
  .dot.active { background: #333; }
</style>
</head>
<body>

<div class="container">
  <div class="slider" id="slider">
    <div class="page">Home</div>
    <div class="page">Explore</div>
    <div class="page">Profile</div>
  </div>
</div>
<div class="dots" id="dots"></div>

<script>
  const slider = document.getElementById('slider');
  const dotsContainer = document.getElementById('dots');
  const totalPages = slider.children.length;
  let current = 0;

  for (let i = 0; i < totalPages; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    dotsContainer.appendChild(dot);
  }

  function goTo(index) {
    current = index;
    slider.style.transform = `translateX(-${current * 100}%)`;
    document.querySelectorAll('.dot').forEach((d, i) =>
      d.classList.toggle('active', i === current)
    );
  }

  // swipe support
  let startX = 0;
  slider.addEventListener('touchstart', e => startX = e.touches[0].clientX);
  slider.addEventListener('touchend', e => {
    const diff = e.changedTouches[0].clientX - startX;
    if (diff > 50 && current > 0) goTo(current - 1);
    else if (diff < -50 && current < totalPages - 1) goTo(current + 1);
  });
</script>

</body>
</html>
